[pytest]
# Pytest configuration for ZNE Estimator tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    noisy: marks tests that use noisy simulators

# Coverage options (if using pytest-cov)
# addopts = --cov=zne_estimator --cov-report=html --cov-report=term

# Minimum version
minversion = 7.0
