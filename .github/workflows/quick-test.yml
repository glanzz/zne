name: Quick Tests

on:
  push:
    branches: [ '**' ]
  pull_request:

jobs:
  quick-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest tests/test_zne_estimator.py -v

    - name: Test summary
      if: always()
      run: |
        echo "Test run completed"
        pytest tests/test_zne_estimator.py --collect-only -q
